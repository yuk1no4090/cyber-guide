services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cyber_guide}
      POSTGRES_USER: ${POSTGRES_USER:-cyber_guide}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cyber_guide}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-cyber_guide}
      POSTGRES_USER: ${POSTGRES_USER:-cyber_guide}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      OPENAI_MODEL: ${OPENAI_MODEL:-glm-4-flash}
      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-25000}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      EMAIL_CODE_ENABLED: ${EMAIL_CODE_ENABLED:-false}
      EMAIL_CODE_DEV_LOG_ONLY: ${EMAIL_CODE_DEV_LOG_ONLY:-true}
      EMAIL_CODE_FROM: ${EMAIL_CODE_FROM:-}
      EMAIL_CODE_HASH_PEPPER: ${EMAIL_CODE_HASH_PEPPER:-cyber-guide-email-code-pepper}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      GITHUB_FRONTEND_CALLBACK: ${GITHUB_FRONTEND_CALLBACK:-}
      GITHUB_ALLOWED_REDIRECT_ORIGINS: ${GITHUB_ALLOWED_REDIRECT_ORIGINS:-}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,https://*.cyberguide.dev}
      RAG_KNOWLEDGE_BASE_PATH: /app/knowledge_base
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro

  frontend:
    build:
      context: ./frontend
      args:
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8080}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8080}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  crawler:
    build: ./crawler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-cyber_guide}
      POSTGRES_USER: ${POSTGRES_USER:-cyber_guide}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      CRAWLER_ENABLED: ${CRAWLER_ENABLED:-true}
      CRAWLER_INTERVAL_MINUTES: ${CRAWLER_INTERVAL_MINUTES:-360}
      CRAWLER_MAX_PAGES_PER_SOURCE: ${CRAWLER_MAX_PAGES_PER_SOURCE:-3}

volumes:
  pgdata:
  redisdata:
