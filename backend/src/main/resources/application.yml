server:
  port: ${BACKEND_PORT:8080}
  tomcat:
    threads:
      max: ${TOMCAT_THREADS_MAX:300}
      min-spare: ${TOMCAT_THREADS_MIN_SPARE:20}
    accept-count: ${TOMCAT_ACCEPT_COUNT:1000}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:8192}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT_MS:5000}

spring:
  application:
    name: cyber-guide-backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:cyber_guide}
    username: ${POSTGRES_USER:cyber_guide}
    password: ${POSTGRES_PASSWORD:changeme}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:6}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:2000}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:48}
          max-idle: ${REDIS_POOL_MAX_IDLE:16}
          min-idle: ${REDIS_POOL_MIN_IDLE:6}
          max-wait: 2000ms
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

# AI configuration
ai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
  model: ${OPENAI_MODEL:glm-4-flash}
  fallback-model: ${OPENAI_FALLBACK_MODEL:}
  timeout-ms: ${OPENAI_TIMEOUT_MS:18000}

# RAG configuration
rag:
  knowledge-base-path: ${RAG_KNOWLEDGE_BASE_PATH:../knowledge_base/skills}
  max-evidence-chunk-length: 800
  default-top-k: 4

# JWT Security
security:
  jwt:
    secret: ${JWT_SECRET:cyber-guide-default-secret-key-change-in-production-32chars!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  email-code:
    enabled: ${EMAIL_CODE_ENABLED:false}
    dev-log-only: ${EMAIL_CODE_DEV_LOG_ONLY:true}
    from: ${EMAIL_CODE_FROM:}
    hash-pepper: ${EMAIL_CODE_HASH_PEPPER:cyber-guide-email-code-pepper}
  oauth:
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/auth/github/callback}
      frontend-callback: ${GITHUB_FRONTEND_CALLBACK:http://localhost:3000}
      allowed-redirect-origins: ${GITHUB_ALLOWED_REDIRECT_ORIGINS:http://localhost:3000}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,https://*.cyberguide.dev}

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      aiService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      aiRetry:
        max-attempts: 2
        wait-duration: 1s

# Rate limit (legacy, kept for reference)
rate-limit:
  chat-per-minute: 15

concurrency:
  chat:
    max-inflight: ${CHAT_MAX_INFLIGHT:90}
  stream:
    max-inflight: ${STREAM_MAX_INFLIGHT:20}

debug:
  chat-log:
    enabled: ${DEBUG_CHAT_LOG_ENABLED:false}
    max-chars: ${DEBUG_CHAT_LOG_MAX_CHARS:1200}
    allowed-profiles: ${DEBUG_CHAT_LOG_ALLOWED_PROFILES:local,dev,test}
    session-id: ${DEBUG_CHAT_LOG_SESSION_ID:}
    sample-rate: ${DEBUG_CHAT_LOG_SAMPLE_RATE:1.0}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    circuitbreakers:
      enabled: true
    redis:
      enabled: true
    mail:
      enabled: false

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
