name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 21 + Maven)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cyber_guide_test
          POSTGRES_USER: cyber_guide
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile
        run: ./mvnw compile -q
        working-directory: backend

      - name: Run tests
        run: ./mvnw test -q
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: cyber_guide_test
          POSTGRES_USER: cyber_guide
          POSTGRES_PASSWORD: testpass
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          OPENAI_API_KEY: test-key
          OPENAI_BASE_URL: https://example.com
          OPENAI_MODEL: test-model

      - name: Generate JaCoCo report
        run: ./mvnw jacoco:report -q
        working-directory: backend

  frontend:
    name: Frontend (Next.js 15 + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Run tests
        run: npm run test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  crawler:
    name: Crawler (Python + Scrapy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: crawler

      - name: Verify Scrapy spiders
        run: python -m scrapy list
        working-directory: crawler
        env:
          SCRAPY_SETTINGS_MODULE: cyberguide_crawler.settings

      - name: Compile check
        run: python -m compileall cyberguide_crawler
        working-directory: crawler

      - name: Run tests
        run: pytest tests/ -v
        working-directory: crawler

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend, crawler]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cyber-guide-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t cyber-guide-frontend:ci ./frontend

      - name: Build crawler image
        run: docker build -t cyber-guide-crawler:ci ./crawler
